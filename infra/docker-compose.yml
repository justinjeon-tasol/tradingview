# 프로젝트 이름을 고정 — 디렉터리명과 관계없이 동일 스택으로 인식된다.
# VM1의 기존 ~/trading-infra/ 에서 띄운 tv1-pg / tv1-redis 볼륨을 그대로 재사용.
# 이 선언 없이 ~/trading-app/infra/ 에서 돌리면 project=infra로 잡혀 볼륨 신규 생성 → 데이터 단절.
name: trading-infra

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: tv1-pg
    restart: unless-stopped
    environment:
      # Postgres superuser — 운영/마이그레이션 전용, 앱에선 사용 금지
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in infra/.env}
      # docker-entrypoint가 postgres 유저로 'trading' DB를 자동 생성
      POSTGRES_DB: trading
      # init-roles.sh에서 trading_app 유저 생성에 사용
      TRADING_APP_PASSWORD: ${TRADING_APP_PASSWORD:?TRADING_APP_PASSWORD is required in infra/.env}
      # VM1 12GB RAM을 SaaS 워크로드와 나눠 써야 하므로 Timescale 튜닝 보수적으로
      TS_TUNE_MEMORY: 3GB
      TS_TUNE_NUM_CPUS: "2"
    volumes:
      - tsdb-data:/var/lib/postgresql/data
      # 초기화 스크립트는 파일명 순서대로 실행됨 (05 → 10)
      - ./init-roles.sh:/docker-entrypoint-initdb.d/05-init-roles.sh:ro
      - ./init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    ports:
      # 기본 127.0.0.1 (로컬 전용). Tailscale로 원격 접속하려면
      # .env의 DB_BIND_HOST를 VM1 Tailscale IP(100.x.x.x)로 설정
      - "${DB_BIND_HOST:-127.0.0.1}:5432:5432"
    # VM1 공유 자원 보호: 최대 4GB까지만 사용
    mem_limit: 4g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tv1-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required in infra/.env}
    volumes:
      - redis-data:/data
    # sh -c로 감싸서 $$REDIS_PASSWORD가 shell에서 평가되도록
    command: >
      sh -c 'exec redis-server
      --save 60 1
      --appendonly yes
      --requirepass "$$REDIS_PASSWORD"
      --maxmemory 768mb
      --maxmemory-policy allkeys-lru'
    ports:
      - "${REDIS_BIND_HOST:-127.0.0.1}:6379:6379"
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # tv1-web — Next.js 차트 앱 (프로덕션)
  # 빌드는 프로젝트 루트의 Dockerfile. 환경변수는 infra/.env.web에서 주입.
  # ---------------------------------------------------------------------------
  tv1-web:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: tv1-web
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      # 도커 내부 네트워크 기준 — tv1-pg/tv1-redis 호스트명 사용
      DATABASE_URL: postgres://trading_app:${TRADING_APP_PASSWORD}@tv1-pg:5432/trading
      REDIS_URL: redis://:${REDIS_PASSWORD}@tv1-redis:6379
      KIS_APP_KEY: ${KIS_APP_KEY:?KIS_APP_KEY required}
      KIS_APP_SECRET: ${KIS_APP_SECRET:?KIS_APP_SECRET required}
      KIS_ENV: ${KIS_ENV:-live}
      KIS_ACCESS_TOKEN: ${KIS_ACCESS_TOKEN:-}
      KIS_ACCESS_TOKEN_EXPIRES_AT: ${KIS_ACCESS_TOKEN_EXPIRES_AT:-}
      CRON_SHARED_SECRET: ${CRON_SHARED_SECRET:-}
    # 호스트 nginx(trading.jeons.kr과 동일 머신)가 127.0.0.1:3000으로 접근.
    # 외부에는 노출하지 않음 — 엣지는 nginx가 담당.
    ports:
      - "127.0.0.1:3000:3000"
    mem_limit: 768m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/candles?symbol=005930&interval=5m"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # 엣지 리버스 프록시는 호스트 nginx (기존 trading.jeons.kr·Supabase와 공유).
  # stockchart 설정은 infra/nginx-stockchart.conf를 /etc/nginx/sites-available/으로 복사.
  # Caddy 대체 컨테이너는 쓰지 않는다 (호스트 nginx와 80/443 충돌).

volumes:
  tsdb-data:
  redis-data:
