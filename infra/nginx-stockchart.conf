# /etc/nginx/sites-available/stockchart.jeons.kr
# Full config — 인증서 발급 완료 후 사용할 최종 버전.
# 발급 전에는 infra/DEPLOY.md §6a의 bootstrap 버전을 먼저 넣고 certbot 실행.

# HTTP → HTTPS 리다이렉트 + ACME 갱신 검증
server {
    listen 80;
    listen [::]:80;
    server_name stockchart.jeons.kr;

    # Certbot renewal 경로 (trading.jeons.kr과 동일)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 메인 — Next.js tv1-web (127.0.0.1:3000) 리버스 프록시
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stockchart.jeons.kr;

    ssl_certificate     /etc/letsencrypt/live/stockchart.jeons.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stockchart.jeons.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # 보안 헤더 (trading.jeons.kr 패턴과 일관)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 압축
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # 접근 로그 (기존 trading.jeons.kr과 분리)
    access_log /var/log/nginx/stockchart.access.log;
    error_log  /var/log/nginx/stockchart.error.log warn;

    # 업로드·응답 최대치 (차트 API 응답이 수 MB 될 수 있음)
    client_max_body_size 5m;

    # Tailscale CGNAT 범위 (100.64.0.0/10)만 접근 허용되는 매매 경로.
    # 지금은 사용 X — UI에 /trade/* 추가될 때 활성. 외부 차단을 edge에서 먼저 걸어둠.
    location /trade/ {
        allow 100.64.0.0/10;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 차트 캔들 API — 첫 DB 미스 시 KIS 백필 (VM1 Singapore → KIS Korea 지연 + 페이지네이션 + 300ms throttle).
    # 최악의 경우 7일치 × 13페이지 ≈ 45~60s 소요. 기본 60s로는 빠듯해 120s로 확장.
    location /api/candles {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Cron 트리거 경로 — 앱이 Bearer CRON_SHARED_SECRET 검증
    location /api/cron/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 전체 유니버스 수집은 30초+ 걸릴 수 있음
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
    }

    # 기본 — 공개 차트·검색·API
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js의 HMR·Server Components 스트리밍 대응
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 60s;
    }
}
